<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Schoolar Academy</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Splash -->
<div id="splash">
  <img src="icon-192.png" class="logo">
</div>

<!-- Landing -->
<div id="landing">
  <h1>Schoolar Academy</h1>
  <p id="quote"></p>
  <button id="startBtn">Start Studying</button>
</div>

<!-- Loader -->
<div id="loader">
  <div class="spinner"></div>
</div>

<!-- App -->
<div id="appContainer">
  <iframe src="https://smart-scholar-hub.base44.app" id="appFrame"></iframe>

  <!-- Bottom Bar -->
  <div id="bottomBar">
    <span id="barQuote"></span>
  </div>
</div>

<!-- Install Button -->
<button id="installBtn">Install</button>

<script src="script.js"></script>
</body>
</html>
